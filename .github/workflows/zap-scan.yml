name: ZAP DAST

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [develop]
  schedule:
    - cron: "0 6 * * 1" # weekly (Mon 06:00 UTC)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  zap-baseline:
    name: ZAP Baseline (passive)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_SISCAV_API_URL: http://127.0.0.1:8000
        run: npm run build

      - name: Start Next.js (background)
        env:
          PORT: "3000"
          NEXT_PUBLIC_SISCAV_API_URL: http://127.0.0.1:8000
        run: |
          nohup npm start > next-start.log 2>&1 &

      - name: Wait for app readiness
        run: |
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:3000/login" > /dev/null; then
              echo "App is ready."
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time."
          echo "---- next-start.log ----"
          tail -n 200 next-start.log || true
          exit 1

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://127.0.0.1:3000"
          cmd_options: "-r zap-report.html -J zap-report.json"
          rules_file_name: "security/zap/rules.tsv"
          fail_action: true
          allow_issue_writing: false

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            zap-report.html
            zap-report.json
          retention-days: 30

  zap-full:
    name: ZAP Full (active)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_SISCAV_API_URL: http://127.0.0.1:8000
        run: npm run build

      - name: Start Next.js (background)
        env:
          PORT: "3000"
          NEXT_PUBLIC_SISCAV_API_URL: http://127.0.0.1:8000
        run: |
          nohup npm start > next-start.log 2>&1 &

      - name: Wait for app readiness
        run: |
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:3000/login" > /dev/null; then
              echo "App is ready."
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time."
          echo "---- next-start.log ----"
          tail -n 200 next-start.log || true
          exit 1

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: "http://127.0.0.1:3000"
          cmd_options: "-r zap-report.html -J zap-report.json"
          rules_file_name: "security/zap/rules.tsv"
          fail_action: true
          allow_issue_writing: false

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-full-report
          path: |
            zap-report.html
            zap-report.json
          retention-days: 90
